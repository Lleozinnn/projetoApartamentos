<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estiloGlobal.css">
    <title>Criar cadastro</title>
</head>

<body>
    <header>
                <img src="assets/logo.png" alt="Logotipo Beling Apartamentos">
        <nav>
            <ul>
                <a href="index.html">Início</a>
                <a href="realState.html">Nossos Imóveis</a>
                <a href="contact.html">Contate-nos</a>
                <a href="register.html">Crie uma conta</a>
                <a href="login.html">Faça login</a>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Cadastre-se</h1>
            <h2>Preencha o formulário a seguir e realize seu cadastro em instantes</h2>
            <form action="login.html">
                <label for="nome">Nome:</label>
                <input id="nome" type="text" placeholder="Digite seu nome" required name="nome"
                    oninvalid="this.setCustomValidity('Por favor, Informe seu nome completo.')"
                    oninput="this.setCustomValidity('')" minlength="5">
                
                <label for="cpf">CPF:</label>
                <input id="cpf" type="text" placeholder="Digite seu CPF" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}"
                    required maxlength="14" oninvalid="this.setCustomValidity('Digite o cpf com o formato correto.')"
                    oninput="this.setCustomValidity('')" name="cpf">
                
                <label for="email">E-mail:</label>
                <input id="email" type="email" placeholder="Digite seu E-mail" required
                    oninvalid="this.setCustomValidity('Por favor, Informe um e-mail válido.')"
                    oninput="this.setCustomValidity('')" name="email">
                
                <label for="telefone">Telefone:</label>
                <input id="telefone" type="tel" placeholder="Digite seu telefone" required name="telefone"
                    oninvalid="this.setCustomValidity('Digite um telefone válido sem pontuações.')"
                    oninput="this.setCustomValidity('')" minlength="9" maxlength="11">
                
                <label for="nascimento">Data de nascimento:</label>
                <input id="nascimento" type="date" required name="nascimento"
                    oninvalid="this.setCustomValidity('Por favor, Informe sua data de nascimento')"
                    oninput="this.setCustomValidity('')">
                
                <label for="senha">Senha:</label>
                <input id="senha" type="password" placeholder="Crie uma senha forte" required minlength="6"
                    oninvalid="this.setCustomValidity('Digite uma senha com no mínimo 6 caracteres')"
                    oninput="this.setCustomValidity('')" name="senha">
                
                <label for="genero">Gênero:</label>
                <input type="radio" name="genero" id="masculino" value="Masculino" required name="genero">
                <label for="masculino">Masculino</label>
                <input type="radio" name="genero" id="feminino" value="Feminino" required name="genero">
                <label for="feminino">Feminino</label>
                
                <label for="termos">Aceite os termos a seguir:</label>
                
                <input type="checkbox" name="termos" id="termo1" value="termo1" required
                    oninvalid="this.setCustomValidity('Aceite este termo para prosseguir.')"
                    oninput="this.setCustomValidity('')">
                <label for="termo1">Aceito ter meus dados armazenados durante o uso do serviço</label>
                
                <input type="checkbox" name="termos" id="termo2" value="termo2" required
                    oninvalid="this.setCustomValidity('Aceite este termo para prosseguir.')"
                    oninput="this.setCustomValidity('')">
                <label for="termo2">Aceito os termos e condições desse site</label>
                
                <input type="checkbox" name="termos" id="termo3" value="termo3">
                <label for="termo3">Aceito receber comunicações sobre novidades e ofertas</label>
                
                <input type="submit" value="Efetuar Cadastro">
                <a href="login.html">Já tenho a conta Beling</a>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2024 Beling Imóveis. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
