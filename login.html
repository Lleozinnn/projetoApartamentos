<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estiloGlobal.css">
    <title>Entrar na conta Beling</title>
</head>

<body>
    <header>
        <img src="assets/logo.png" alt="Logotipo Beling Apartamentos">
        <nav>
            <ul>
                <a href="index.html">Início</a>
                <a href="realState.html">Nossos Imóveis</a>
                <a href="contact.html">Contate-nos</a>
                <a href="register.html">Crie uma conta</a>
                <a href="login.html">Faça login</a>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Log-in</h1>
        <h2>Entre com sua conta Beling para prosseguir com a locação</h2>
        <form action="rental.html">
            <label for="cpf">CPF:</label>
            <input type="tel" placeholder="Informe o CPF" required pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}"
                oninvalid="this.setCustomValidity('Por favor, informe seu CPF no padrão correto com pontos e hífen.')"
                oninput="this.setCustomValidity('')" name="cpf">
            
            <label for="senha">Senha:</label>
            <input type="password" placeholder="Informe sua senha Beling" required
                oninvalid="this.setCustomValidity('Por favor, informe sua senha.')" oninput="this.setCustomValidity('')"
                name="senha">
            
            <input type="submit" value="Entrar">
            <a href="register.html">Não possuo a conta Beling</a>
        </form>
    </main>
    <footer>
        <p>© 2024 Beling Apartamentos. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
